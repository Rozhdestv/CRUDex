<!doctype html>
<!-- frontend/index.html -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/style.css" />
    <title>APP</title>
  </head>
  <body>
    <div id="app">
      <div id="loginSection">
        <h2>Iniciar sesión</h2>
        <input type="text" id="loginUsername" placeholder="Usuario" />
        <input type="password" id="loginPassword" placeholder="Contraseña" />
        <button id="loginBtn">Ingresar</button>
        <div id="loginError" style="color: red"></div>
      </div>
      <div id="mainApp" style="display: none">
        <h1>Aplicacion</h1>
        <button id="logoutBtn">Cerrar sesión</button>
        <form id="formPlan">
          <input type="text" id="tema" placeholder="Tema" />
          <input type="text" id="descripcion" placeholder="Descripción" />
          <button type="submit">Guardar</button>
        </form>
        <ul id="temasLista"></ul>
        <dialog id="modalEditar">
          <h3>Editar Planificación</h3>
          <form id="formEditar">
            <input type="hidden" id="editId" />
            <input type="text" id="editTema" placeholder="Tema" required />
            <input
              type="text"
              id="editDesc"
              placeholder="Descripción"
              required
            />
            <button type="submit">Actualizar</button>
            <button type="button" id="btnCerrar">Cancelar</button>
          </form>
        </dialog>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
